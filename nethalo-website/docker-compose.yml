version: '3.8'

services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-nethalo-dev-secret-key-change-in-production}
      - DATABASE_URL=/app/data/nethalo.db
    volumes:
      - nethalo_data:/app/data
    restart: unless-stopped

volumes:
  nethalo_data: