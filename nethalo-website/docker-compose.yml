version: '3.8'

services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-national-hate-crime-dev-secret-key-change-in-production}
      - DATABASE_URL=/app/data/National Hate Crime.db
    volumes:
      - national-hate-crime_data:/app/data
    restart: unless-stopped

volumes:
  national-hate-crime_data:

